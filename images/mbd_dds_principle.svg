<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 470">
<style>
  text { font-family: 'Segoe UI', Arial, sans-serif; }
  .title { font-size: 16px; font-weight: bold; fill: #1B4F72; }
  .subtitle { font-size: 12px; fill: #1B4F72; font-weight: bold; }
  .label-b { font-size: 11px; fill: #2C3E50; font-weight: bold; }
  .label-s { font-size: 10px; fill: #666; }
  .code { font-family: 'Courier New', monospace; font-size: 9px; fill: #2C3E50; }
  .sig { font-family: 'Courier New', monospace; font-size: 9px; fill: #1B4F72; font-weight: bold; }
  .math { font-family: 'Times New Roman', serif; font-size: 13px; font-style: italic; fill: #2C3E50; }
</style>
<defs>
  <marker id="mb" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 0L10 5L0 10z" fill="#1B4F72"/>
  </marker>
  <marker id="mg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 0L10 5L0 10z" fill="#1E8449"/>
  </marker>
  <marker id="mo" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 0L10 5L0 10z" fill="#E67E22"/>
  </marker>
  <marker id="my" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 0L10 5L0 10z" fill="#B7950B"/>
  </marker>
</defs>

<text x="360" y="22" text-anchor="middle" class="title">DDS — One 50 MHz Clock, Any Output Frequency</text>
<text x="360" y="40" text-anchor="middle" class="label-s">The clock never changes. phase_inc is the frequency knob.</text>

<!-- ===== Input: phase_inc ===== -->
<text x="50" y="118" class="label-b" fill="#1B4F72">phase_inc</text>
<text x="50" y="132" class="label-s">(from SW freq)</text>
<line x1="110" y1="115" x2="155" y2="115" stroke="#1B4F72" stroke-width="1.5" marker-end="url(#mb)"/>

<!-- ===== Phase Accumulator block ===== -->
<rect x="155" y="80" width="180" height="100" rx="8" fill="#FDEBD0" stroke="#E67E22" stroke-width="2"/>
<text x="245" y="100" text-anchor="middle" class="subtitle" fill="#E67E22">Phase Accumulator</text>
<text x="245" y="115" text-anchor="middle" class="label-s">32-bit register</text>

<rect x="170" y="125" width="150" height="22" rx="3" fill="#FFFFFF" stroke="#E67E22"/>
<text x="245" y="140" text-anchor="middle" class="code">phase_acc += phase_inc</text>

<text x="245" y="162" text-anchor="middle" class="label-s">every clock cycle</text>
<text x="245" y="174" text-anchor="middle" class="code">(Sum + Unit Delay)</text>

<!-- feedback loop -->
<path d="M 320,160 C 340,160 340,195 245,195 C 175,195 175,180 175,180" 
      fill="none" stroke="#E67E22" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#mo)"/>
<text x="250" y="208" class="label-s" fill="#E67E22">accumulate (feedback)</text>

<!-- clock input -->
<text x="195" y="68" class="sig" fill="#8E44AD">clk 50MHz</text>
<line x1="245" y1="72" x2="245" y2="80" stroke="#8E44AD" stroke-width="1.5" stroke-dasharray="3,2"/>

<!-- ===== bit slice ===== -->
<line x1="335" y1="115" x2="375" y2="115" stroke="#E67E22" stroke-width="1.5" marker-end="url(#mo)"/>
<text x="338" y="108" class="sig" fill="#E67E22">phase_acc[31:0]</text>

<rect x="375" y="92" width="95" height="46" rx="6" fill="#D5F5E3" stroke="#1E8449" stroke-width="1.5"/>
<text x="422" y="110" text-anchor="middle" class="label-b">take top</text>
<text x="422" y="124" text-anchor="middle" class="label-b">8 bits</text>
<text x="422" y="135" text-anchor="middle" class="code">[31:24]</text>

<!-- ===== Sine LUT ===== -->
<line x1="470" y1="115" x2="510" y2="115" stroke="#1E8449" stroke-width="1.5" marker-end="url(#mg)"/>
<text x="472" y="108" class="sig" fill="#1E8449">addr[7:0]</text>

<rect x="510" y="80" width="160" height="100" rx="8" fill="#D5F5E3" stroke="#1E8449" stroke-width="2"/>
<text x="590" y="100" text-anchor="middle" class="subtitle" fill="#1E8449">Sine LUT</text>
<text x="590" y="114" text-anchor="middle" class="label-s">256 samples, 1 cycle</text>

<!-- mini sine inside -->
<path d="M 525,150 Q 545,128 565,150 T 605,150 T 645,150" 
      fill="none" stroke="#1E8449" stroke-width="1.5"/>
<line x1="525" y1="150" x2="655" y2="150" stroke="#AEB6BF" stroke-width="0.5"/>
<text x="590" y="172" text-anchor="middle" class="code">sfix8_En6</text>

<!-- ===== Output ===== -->
<line x1="670" y1="115" x2="700" y2="115" stroke="#B7950B" stroke-width="2" marker-end="url(#my)"/>
<text x="600" y="200" class="label-b" fill="#B7950B">sine_out[7:0]</text>
<text x="600" y="213" class="label-s">-1.0 ~ +1.0</text>

<!-- ===== Formula box ===== -->
<rect x="40" y="240" width="640" height="90" rx="8" fill="#D6EAF8" stroke="#1B4F72" stroke-width="2"/>
<text x="360" y="262" text-anchor="middle" class="subtitle">The DDS Frequency Equation</text>

<text x="360" y="290" text-anchor="middle" class="math">f_out  =  ( phase_inc / 2³² )  ×  f_clk</text>

<text x="170" y="314" text-anchor="middle" class="label-s">phase_inc large</text>
<text x="170" y="326" text-anchor="middle" class="label-s">→ address moves fast → high frequency</text>
<text x="540" y="314" text-anchor="middle" class="label-s">phase_inc small</text>
<text x="540" y="326" text-anchor="middle" class="label-s">→ address moves slow → low frequency</text>

<!-- ===== Examples ===== -->
<rect x="40" y="345" width="640" height="105" rx="8" fill="#F8F9FA" stroke="#AEB6BF" stroke-width="1"/>
<text x="50" y="365" class="label-b">Examples (32-bit accumulator, 50 MHz clock):</text>

<text x="60" y="386" class="code">f_out = 0.1 Hz  →  phase_inc = 0.1 × 2³² / 50M  ≈  9</text>
<text x="60" y="404" class="code">f_out = 1.0 Hz  →  phase_inc = 1.0 × 2³² / 50M  ≈  86</text>
<text x="60" y="422" class="code">f_out = 3.5 Hz  →  phase_inc = 3.5 × 2³² / 50M  ≈  301</text>
<text x="60" y="440" class="code">f_out = 9.9 Hz  →  phase_inc = 9.9 × 2³² / 50M  ≈  850</text>

<text x="400" y="386" class="label-s">Frequency resolution:</text>
<text x="400" y="402" class="code">2³² gives ≈ 0.0116 Hz steps</text>
<text x="400" y="421" class="label-s">More accumulator bits</text>
<text x="400" y="437" class="label-s">→ finer frequency control.</text>
</svg>
