<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 510">
<style>
  text { font-family: 'Segoe UI', Arial, sans-serif; }
  .title { font-size: 16px; font-weight: bold; fill: #1B4F72; }
  .subtitle { font-size: 12px; fill: #1B4F72; font-weight: bold; }
  .label-b { font-size: 11px; fill: #2C3E50; font-weight: bold; }
  .label-s { font-size: 10px; fill: #666; }
  .code { font-family: 'Courier New', monospace; font-size: 9px; fill: #2C3E50; }
  .code-b { font-family: 'Courier New', monospace; font-size: 10px; fill: #2C3E50; font-weight: bold; }
  .sig { font-family: 'Courier New', monospace; font-size: 9px; font-weight: bold; }
  .tag { font-size: 10px; font-weight: bold; }
</style>
<defs>
  <marker id="mg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 0L10 5L0 10z" fill="#1E8449"/>
  </marker>
  <marker id="mo" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 0L10 5L0 10z" fill="#E67E22"/>
  </marker>
  <marker id="my" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 0L10 5L0 10z" fill="#B7950B"/>
  </marker>
</defs>

<text x="350" y="22" text-anchor="middle" class="title">Sine LUT — MATLAB Function becomes a ROM</text>
<text x="350" y="40" text-anchor="middle" class="label-s">256 sine samples stored once, looked up by address</text>

<!-- ===== Input ===== -->
<text x="40" y="120" class="label-b" fill="#E67E22">addr [7:0]</text>
<text x="40" y="134" class="label-s">0 ~ 255</text>
<line x1="105" y1="116" x2="160" y2="116" stroke="#E67E22" stroke-width="1.8" marker-end="url(#mo)"/>

<!-- ===== MATLAB Function block ===== -->
<rect x="160" y="70" width="290" height="180" rx="8" fill="#D5F5E3" stroke="#1E8449" stroke-width="2.5"/>
<rect x="160" y="70" width="290" height="20" rx="8" fill="#1E8449"/>
<text x="305" y="84" text-anchor="middle" class="tag" fill="#FFFFFF">MATLAB Function — sine_lut</text>

<!-- code inside -->
<rect x="172" y="100" width="266" height="138" rx="4" fill="#FFFFFF" stroke="#1E8449" stroke-width="1"/>
<text x="180" y="116" class="code">function y = sine_lut(addr)</text>
<text x="180" y="132" class="code">  persistent LUT</text>
<text x="180" y="148" class="code">  if isempty(LUT)</text>
<text x="180" y="164" class="code">    n   = 0:255;</text>
<text x="180" y="180" class="code">    raw = sin(2*pi*n/256);</text>
<text x="180" y="196" class="code">    LUT = fi(raw, 1, 8, 6);</text>
<text x="180" y="212" class="code">  end</text>
<text x="180" y="228" class="code">  y = LUT(uint16(addr)+1);</text>

<!-- ===== Output ===== -->
<line x1="450" y1="160" x2="600" y2="160" stroke="#B7950B" stroke-width="2.2" marker-end="url(#my)"/>
<text x="470" y="153" class="sig" fill="#B7950B">sine_out [7:0]</text>
<text x="615" y="157" class="label-b" fill="#B7950B">sine_out</text>
<text x="615" y="171" class="label-s">sfix8_En6</text>
<text x="615" y="183" class="label-s">-1.0 ~ +1.0</text>

<!-- ===== annotation: persistent ===== -->
<path d="M 305,132 C 305,260 480,255 480,275" fill="none" stroke="#1E8449" stroke-width="1" stroke-dasharray="3,2"/>
<text x="488" y="278" class="label-s" fill="#1E8449">built ONCE,</text>
<text x="488" y="290" class="label-s" fill="#1E8449">then reused</text>

<!-- ============ How it becomes a ROM ============ -->
<rect x="40" y="262" width="410" height="138" rx="8" fill="#D6EAF8" stroke="#1B4F72" stroke-width="1.5"/>
<text x="50" y="282" class="subtitle">What HDL Coder generates from this</text>

<text x="58" y="302" class="label-s">The persistent array becomes a read-only memory (ROM):</text>

<rect x="58" y="310" width="380" height="80" rx="4" fill="#FFFFFF" stroke="#1B4F72" stroke-width="1"/>
<text x="66" y="325" class="code">always @(*)</text>
<text x="66" y="338" class="code">  case (addr)</text>
<text x="66" y="351" class="code">    8'd0  : sine_out = 8'b00000000;  // sin(0)   = 0</text>
<text x="66" y="364" class="code">    8'd64 : sine_out = 8'b01000000;  // sin(90)  = +1.0</text>
<text x="66" y="377" class="code">    ... 256 entries total ...</text>
<text x="66" y="387" class="code">  endcase</text>

<!-- ============ sin LUT visual ============ -->
<rect x="465" y="262" width="195" height="138" rx="8" fill="#F8F9FA" stroke="#AEB6BF" stroke-width="1"/>
<text x="562" y="282" text-anchor="middle" class="label-b">256 samples = 1 cycle</text>

<!-- sine curve -->
<g transform="translate(480,290)">
  <line x1="0" y1="50" x2="165" y2="50" stroke="#AEB6BF" stroke-width="0.6"/>
  <line x1="0" y1="20" x2="0" y2="80" stroke="#AEB6BF" stroke-width="0.6"/>
  <path d="M 0,50 Q 20,18 41,50 T 82,50 T 124,50 T 165,50"
        fill="none" stroke="#1E8449" stroke-width="2"/>
  <!-- sample dots -->
  <circle cx="0"   cy="50" r="2" fill="#E67E22"/>
  <circle cx="20"  cy="26" r="2" fill="#E67E22"/>
  <circle cx="41"  cy="50" r="2" fill="#E67E22"/>
  <circle cx="62"  cy="74" r="2" fill="#E67E22"/>
  <circle cx="82"  cy="50" r="2" fill="#E67E22"/>
  <text x="-3" y="14" class="bitnum" fill="#666">+1.0</text>
  <text x="-3" y="92" class="bitnum" fill="#666">-1.0</text>
</g>
<text x="562" y="392" text-anchor="middle" class="label-s">each dot = one fi(.,1,8,6) value</text>

<!-- ============ key point ============ -->
<rect x="40" y="412" width="620" height="82" rx="8" fill="#D5F5E3" stroke="#1E8449" stroke-width="1.5"/>
<text x="50" y="432" class="subtitle" fill="#1E8449">The MBD payoff</text>
<text x="58" y="452" class="label-s">Hand-coding a 256-entry case statement is tedious and error-prone.</text>
<text x="58" y="467" class="code-b">  sin(2*pi*n/256)  +  fi(raw,1,8,6)   →   256 lines of Verilog, generated automatically.</text>
<text x="58" y="485" class="label-s">One line of math replaces 256 lines of hand-typed table. This is where MBD shines.</text>
</svg>
