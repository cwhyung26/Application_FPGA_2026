<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 500">
<style>
  text { font-family: 'Segoe UI', Arial, sans-serif; }
  .title { font-size: 16px; font-weight: bold; fill: #1B4F72; }
  .subtitle { font-size: 12px; fill: #1B4F72; font-weight: bold; }
  .label-b { font-size: 11px; fill: #2C3E50; font-weight: bold; }
  .label-s { font-size: 10px; fill: #666; }
  .sig { font-family: 'Courier New', monospace; font-size: 9px; fill: #1B4F72; font-weight: bold; }
  .tag { font-size: 9px; font-weight: bold; }
  .code { font-family: 'Courier New', monospace; font-size: 9px; fill: #2C3E50; }
</style>
<defs>
  <marker id="ab" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 0L10 5L0 10z" fill="#1B4F72"/>
  </marker>
  <marker id="ao" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 0L10 5L0 10z" fill="#E67E22"/>
  </marker>
  <marker id="ag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 0L10 5L0 10z" fill="#1E8449"/>
  </marker>
</defs>

<text x="360" y="24" text-anchor="middle" class="title">DDS Sine Generator - Top Integration (dds_top)</text>
<text x="360" y="42" text-anchor="middle" class="label-s">MBD 2 core + MBD 3 display modules, wired into one top module</text>

<!-- ===== Board inputs (left) ===== -->
<rect x="20" y="70" width="120" height="150" rx="8" fill="#EAF2F8" stroke="#1B4F72" stroke-width="1.5"/>
<text x="80" y="90" text-anchor="middle" class="subtitle">Board Inputs</text>
<text x="32" y="112" class="code">CLOCK_50</text>
<text x="32" y="126" class="label-s">50MHz clock</text>
<text x="32" y="148" class="code">KEY[0]</text>
<text x="32" y="162" class="label-s">reset (rst_n)</text>
<text x="32" y="184" class="code">SW[7:4]</text>
<text x="32" y="196" class="code">SW[3:0]</text>
<text x="32" y="210" class="label-s">freq int / frac</text>

<!-- ===== dds_sine core (MBD 2) ===== -->
<rect x="190" y="80" width="180" height="110" rx="8" fill="#D5F5E3" stroke="#1E8449" stroke-width="2"/>
<rect x="190" y="80" width="180" height="20" rx="8" fill="#1E8449"/>
<text x="280" y="94" text-anchor="middle" class="tag" fill="#FFFFFF">from MBD 2 - HDL Coder</text>
<text x="280" y="120" text-anchor="middle" class="label-b">dds_sine</text>
<text x="280" y="138" text-anchor="middle" class="label-s">phase accumulator</text>
<text x="280" y="152" text-anchor="middle" class="label-s">+ sine LUT</text>
<text x="280" y="172" text-anchor="middle" class="code">clk_enable = 1'b1</text>
<text x="280" y="184" text-anchor="middle" class="label-s">(single clock)</text>

<!-- inputs to dds_sine -->
<line x1="140" y1="118" x2="190" y2="118" stroke="#1B4F72" stroke-width="1.5" marker-end="url(#ab)"/>
<line x1="140" y1="190" x2="175" y2="190" stroke="#1B4F72" stroke-width="1.5"/>
<line x1="175" y1="190" x2="175" y2="150" stroke="#1B4F72" stroke-width="1.5"/>
<line x1="175" y1="150" x2="190" y2="150" stroke="#1B4F72" stroke-width="1.5" marker-end="url(#ab)"/>

<!-- ===== sine_out signal ===== -->
<line x1="370" y1="135" x2="430" y2="135" stroke="#1E8449" stroke-width="2" marker-end="url(#ag)"/>
<text x="375" y="128" class="sig" fill="#1E8449">sine_out[7:0]</text>
<text x="375" y="150" class="label-s">sfix8_En6</text>

<!-- branch point -->
<circle cx="400" cy="135" r="3" fill="#1E8449"/>
<line x1="400" y1="135" x2="400" y2="330" stroke="#1E8449" stroke-width="2"/>
<line x1="400" y1="330" x2="430" y2="330" stroke="#1E8449" stroke-width="2" marker-end="url(#ag)"/>

<!-- ===== led_bar module (MBD 3) ===== -->
<rect x="430" y="290" width="175" height="90" rx="8" fill="#FDEBD0" stroke="#E67E22" stroke-width="2"/>
<rect x="430" y="290" width="175" height="20" rx="8" fill="#E67E22"/>
<text x="517" y="304" text-anchor="middle" class="tag" fill="#FFFFFF">MBD 3 - AI coding</text>
<text x="517" y="328" text-anchor="middle" class="label-b">led_bar</text>
<text x="517" y="346" text-anchor="middle" class="label-s">sine -> center bar</text>
<text x="517" y="360" text-anchor="middle" class="label-s">10 LEDs, left/right</text>
<text x="517" y="373" text-anchor="middle" class="code">no division</text>

<!-- ===== seg7_freq module (MBD 3) ===== -->
<rect x="430" y="95" width="175" height="90" rx="8" fill="#FDEBD0" stroke="#E67E22" stroke-width="2"/>
<rect x="430" y="95" width="175" height="20" rx="8" fill="#E67E22"/>
<text x="517" y="109" text-anchor="middle" class="tag" fill="#FFFFFF">MBD 3 - AI coding</text>
<text x="517" y="133" text-anchor="middle" class="label-b">seg7_freq</text>
<text x="517" y="151" text-anchor="middle" class="label-s">SW freq -> 7-seg</text>
<text x="517" y="165" text-anchor="middle" class="label-s">"3_5" format</text>
<text x="517" y="178" text-anchor="middle" class="code">no division</text>

<!-- SW direct to seg7_freq -->
<line x1="140" y1="200" x2="160" y2="200" stroke="#1B4F72" stroke-width="1.5"/>
<path d="M 160,200 C 175,200 175,55 410,55 C 410,55 410,95 415,110" 
      fill="none" stroke="#1B4F72" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ab)"/>
<text x="250" y="50" class="label-s" fill="#1B4F72">SW freq goes directly to 7-seg (no division needed)</text>

<!-- led_bar -> LEDR -->
<line x1="605" y1="335" x2="660" y2="335" stroke="#E67E22" stroke-width="2" marker-end="url(#ao)"/>
<!-- seg7 -> HEX -->
<line x1="605" y1="140" x2="660" y2="140" stroke="#E67E22" stroke-width="2" marker-end="url(#ao)"/>

<!-- ===== Board outputs (right) ===== -->
<rect x="615" y="105" width="95" height="70" rx="6" fill="#FEF9E7" stroke="#B7950B" stroke-width="1.5"/>
<text x="662" y="125" text-anchor="middle" class="label-b" fill="#B7950B">HEX3-0</text>
<text x="662" y="142" text-anchor="middle" class="label-s">7-segment</text>
<text x="662" y="158" text-anchor="middle" class="label-s">frequency</text>
<text x="662" y="170" text-anchor="middle" class="label-s">display</text>

<rect x="615" y="300" width="95" height="70" rx="6" fill="#FEF9E7" stroke="#B7950B" stroke-width="1.5"/>
<text x="662" y="320" text-anchor="middle" class="label-b" fill="#B7950B">LEDR[9:0]</text>
<text x="662" y="337" text-anchor="middle" class="label-s">10 LEDs</text>
<text x="662" y="353" text-anchor="middle" class="label-s">sine bar</text>
<text x="662" y="365" text-anchor="middle" class="label-s">display</text>

<!-- ===== Bottom legend ===== -->
<rect x="20" y="420" width="690" height="62" rx="8" fill="#F8F9FA" stroke="#AEB6BF" stroke-width="1"/>
<text x="32" y="440" class="subtitle">Three modules, three origins</text>
<rect x="35" y="450" width="13" height="13" rx="2" fill="#D5F5E3" stroke="#1E8449" stroke-width="1.5"/>
<text x="55" y="461" class="label-s">dds_sine : generated by HDL Coder in MBD 2</text>
<rect x="330" y="450" width="13" height="13" rx="2" fill="#FDEBD0" stroke="#E67E22" stroke-width="1.5"/>
<text x="350" y="461" class="label-s">seg7_freq, led_bar : created by AI coding in MBD 3</text>
<text x="32" y="476" class="label-s">dds_top wires all three together - this is the file downloaded to the DE0 / DE1 board.</text>
</svg>
