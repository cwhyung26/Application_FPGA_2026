<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480">
<style>
  text { font-family: 'Segoe UI', Arial, sans-serif; }
  .title { font-size: 16px; font-weight: bold; fill: #1B4F72; }
  .subtitle { font-size: 12px; fill: #1B4F72; font-weight: bold; }
  .label-b { font-size: 11px; fill: #2C3E50; font-weight: bold; }
  .label-s { font-size: 10px; fill: #666; }
  .code { font-family: 'Courier New', monospace; font-size: 9px; fill: #2C3E50; }
  .port { font-family: 'Courier New', monospace; font-size: 9px; fill: #2C3E50; }
  .sig { font-family: 'Courier New', monospace; font-size: 9px; fill: #1B4F72; font-weight: bold; }
  .note { font-size: 10px; fill: #1B4F72; }
</style>
<defs>
  <marker id="mb" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 0L10 5L0 10z" fill="#1B4F72"/>
  </marker>
  <marker id="mg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 0L10 5L0 10z" fill="#1E8449"/>
  </marker>
  <marker id="mp" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 0L10 5L0 10z" fill="#8E44AD"/>
  </marker>
  <marker id="mo" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 0L10 5L0 10z" fill="#E67E22"/>
  </marker>
  <marker id="my" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 0L10 5L0 10z" fill="#B7950B"/>
  </marker>
</defs>

<text x="360" y="22" text-anchor="middle" class="title">Reaction Time Tester — System Block Diagram</text>
<text x="360" y="40" text-anchor="middle" class="label-s">Wed challenge: build 7 modules and integrate in 70 minutes</text>

<!-- ============ External I/O labels (left & right edges) ============ -->
<!-- Inputs left -->
<text x="35" y="100" class="label-b" fill="#1B4F72">CLOCK_50</text>
<text x="35" y="155" class="label-b" fill="#1B4F72">KEY[0]</text>
<text x="35" y="167" class="label-s">→ rst_n</text>
<text x="35" y="220" class="label-b" fill="#1B4F72">KEY[1]</text>
<text x="35" y="232" class="label-s">START</text>
<text x="35" y="295" class="label-b" fill="#1B4F72">KEY[2]</text>
<text x="35" y="307" class="label-s">REACT</text>

<!-- Outputs right -->
<text x="675" y="185" class="label-b" fill="#B7950B">LEDR[9]</text>
<text x="675" y="197" class="label-s">light</text>
<text x="675" y="345" class="label-b" fill="#B7950B">HEX3..0</text>
<text x="675" y="357" class="label-s">ms display</text>

<!-- ============ Top-level dashed boundary ============ -->
<rect x="95" y="58" width="565" height="370" rx="10" fill="none" stroke="#1B4F72" stroke-width="2" stroke-dasharray="6,3"/>
<text x="105" y="75" class="subtitle">reaction_top</text>

<!-- ============ Column 1: Input-side modules ============ -->
<!-- tick_1ms -->
<rect x="110" y="90" width="130" height="36" rx="6" fill="#FDEBD0" stroke="#E67E22" stroke-width="1.5"/>
<text x="175" y="106" text-anchor="middle" class="label-b">tick_1ms</text>
<text x="175" y="119" text-anchor="middle" class="label-s">DIV=50000 → 1kHz</text>

<!-- lfsr_8bit -->
<rect x="110" y="140" width="130" height="36" rx="6" fill="#D5F5E3" stroke="#1E8449" stroke-width="1.5"/>
<text x="175" y="156" text-anchor="middle" class="label-b">lfsr_8bit</text>
<text x="175" y="169" text-anchor="middle" class="label-s">rand_out [7:0]</text>

<!-- btn_debounce START -->
<rect x="110" y="205" width="130" height="36" rx="6" fill="#FDEBD0" stroke="#E67E22" stroke-width="1.5"/>
<text x="175" y="221" text-anchor="middle" class="label-b">btn_debounce</text>
<text x="175" y="234" text-anchor="middle" class="label-s">u_db_s  (START)</text>

<!-- btn_debounce REACT -->
<rect x="110" y="285" width="130" height="36" rx="6" fill="#FDEBD0" stroke="#E67E22" stroke-width="1.5"/>
<text x="175" y="301" text-anchor="middle" class="label-b">btn_debounce</text>
<text x="175" y="314" text-anchor="middle" class="label-s">u_db_r  (REACT)</text>

<!-- ============ Column 2: Central FSM ============ -->
<rect x="295" y="120" width="170" height="190" rx="8" fill="#D5F5E3" stroke="#1E8449" stroke-width="2"/>
<text x="380" y="140" text-anchor="middle" class="label-b" fill="#1E8449">reaction_fsm</text>
<text x="380" y="153" text-anchor="middle" class="label-s">3-Process Moore</text>

<!-- 4 states laid out 2x2 -->
<rect x="310" y="165" width="65" height="22" rx="11" fill="#FFFFFF" stroke="#1E8449" stroke-width="1.5"/>
<text x="342" y="180" text-anchor="middle" class="port">S_IDLE</text>

<rect x="385" y="165" width="65" height="22" rx="11" fill="#FFFFFF" stroke="#1E8449" stroke-width="1.5"/>
<text x="417" y="180" text-anchor="middle" class="port">S_WAIT_R</text>

<rect x="310" y="200" width="65" height="22" rx="11" fill="#FFFFFF" stroke="#1E8449" stroke-width="1.5"/>
<text x="342" y="215" text-anchor="middle" class="port">S_SHOW</text>

<rect x="385" y="200" width="65" height="22" rx="11" fill="#FFFFFF" stroke="#1E8449" stroke-width="1.5"/>
<text x="417" y="215" text-anchor="middle" class="port">S_WAIT_K</text>

<!-- State transitions (curved Bezier) -->
<path d="M 375,176 C 380,176 380,176 385,176" fill="none" stroke="#1E8449" stroke-width="1" marker-end="url(#mg)"/>
<path d="M 417,187 C 417,193 417,194 417,200" fill="none" stroke="#1E8449" stroke-width="1" marker-end="url(#mg)"/>
<path d="M 385,211 C 380,211 380,211 375,211" fill="none" stroke="#1E8449" stroke-width="1" marker-end="url(#mg)"/>
<path d="M 342,200 C 342,194 342,193 342,187" fill="none" stroke="#1E8449" stroke-width="1" marker-end="url(#mg)"/>

<!-- Internal counter -->
<rect x="305" y="235" width="150" height="30" rx="4" fill="#FFFFFF" stroke="#1E8449" stroke-width="1"/>
<text x="380" y="250" text-anchor="middle" class="port">cnt [13:0]</text>
<text x="380" y="261" text-anchor="middle" class="label-s">+1 per tick_1ms</text>

<!-- Output names -->
<text x="380" y="280" text-anchor="middle" class="label-s">Outputs:</text>
<text x="380" y="293" text-anchor="middle" class="port">led_on, react_time,</text>
<text x="380" y="304" text-anchor="middle" class="port">cheat, timeout</text>

<!-- ============ Column 3: Output-side modules ============ -->
<!-- bin2bcd_16bit -->
<rect x="500" y="195" width="140" height="36" rx="6" fill="#D5F5E3" stroke="#1E8449" stroke-width="1.5"/>
<text x="570" y="211" text-anchor="middle" class="label-b">bin2bcd_16bit</text>
<text x="570" y="224" text-anchor="middle" class="label-s">Double-Dabble</text>

<!-- cheat MUX -->
<rect x="500" y="260" width="140" height="36" rx="6" fill="#FEF9E7" stroke="#B7950B" stroke-width="1.5"/>
<text x="570" y="276" text-anchor="middle" class="label-b">cheat MUX</text>
<text x="570" y="289" text-anchor="middle" class="code">cheat ? 4'hE : bcd</text>

<!-- seg7_decoder x4 -->
<rect x="500" y="325" width="140" height="50" rx="6" fill="#D5F5E3" stroke="#1E8449" stroke-width="1.5"/>
<text x="570" y="343" text-anchor="middle" class="label-b">seg7_decoder × 4</text>
<text x="570" y="358" text-anchor="middle" class="label-s">active-low, MSB=g</text>
<text x="570" y="370" text-anchor="middle" class="label-s">(Mon card #1)</text>

<!-- ============ Signal arrows ============ -->

<!-- CLOCK_50 → all (purple dashed) -->
<line x1="80" y1="100" x2="95" y2="100" stroke="#8E44AD" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#mp)"/>
<line x1="83" y1="100" x2="83" y2="305" stroke="#8E44AD" stroke-width="1" stroke-dasharray="3,2"/>
<line x1="83" y1="160" x2="110" y2="160" stroke="#8E44AD" stroke-width="1" stroke-dasharray="3,2"/>
<line x1="83" y1="225" x2="110" y2="225" stroke="#8E44AD" stroke-width="1" stroke-dasharray="3,2"/>
<line x1="83" y1="305" x2="110" y2="305" stroke="#8E44AD" stroke-width="1" stroke-dasharray="3,2"/>
<line x1="83" y1="170" x2="295" y2="170" stroke="#8E44AD" stroke-width="1" stroke-dasharray="3,2"/>

<!-- rst_n → all -->
<line x1="80" y1="160" x2="83" y2="160" stroke="#E74C3C" stroke-width="1" stroke-dasharray="4,2"/>

<!-- KEY[1] → btn_db_s -->
<path d="M 80,225 C 92,225 92,225 110,225" fill="none" stroke="#1B4F72" stroke-width="1.5" marker-end="url(#mb)"/>

<!-- KEY[2] → btn_db_r -->
<path d="M 80,305 C 92,305 92,305 110,305" fill="none" stroke="#1B4F72" stroke-width="1.5" marker-end="url(#mb)"/>

<!-- tick_1ms → reaction_fsm -->
<path d="M 240,108 C 270,108 270,180 295,180" fill="none" stroke="#E67E22" stroke-width="1.5" marker-end="url(#mo)"/>
<text x="246" y="103" class="sig" fill="#E67E22">tick</text>

<!-- lfsr → reaction_fsm (random_delay) -->
<path d="M 240,158 C 270,158 270,200 295,200" fill="none" stroke="#E67E22" stroke-width="1.5" marker-end="url(#mo)"/>
<text x="246" y="153" class="sig" fill="#E67E22">rand[7:0]</text>

<!-- btn_db_s → reaction_fsm -->
<path d="M 240,223 C 270,223 270,225 295,225" fill="none" stroke="#E67E22" stroke-width="1.5" marker-end="url(#mo)"/>
<text x="246" y="218" class="sig" fill="#E67E22">start_pulse</text>

<!-- btn_db_r → reaction_fsm -->
<path d="M 240,303 C 270,303 270,250 295,250" fill="none" stroke="#E67E22" stroke-width="1.5" marker-end="url(#mo)"/>
<text x="246" y="298" class="sig" fill="#E67E22">react_pulse</text>

<!-- reaction_fsm: led_on → LEDR[9] (direct exit right) -->
<path d="M 465,185 C 580,185 600,185 670,185" fill="none" stroke="#B7950B" stroke-width="2" marker-end="url(#my)"/>
<text x="540" y="178" class="sig" fill="#B7950B">led_on</text>

<!-- reaction_fsm react_time → bin2bcd -->
<path d="M 465,213 C 480,213 487,213 500,213" fill="none" stroke="#1E8449" stroke-width="1.5" marker-end="url(#mg)"/>
<text x="470" y="208" class="sig" fill="#1E8449">react_time[13:0]</text>

<!-- bin2bcd → cheat MUX -->
<path d="M 570,231 C 570,245 570,250 570,260" fill="none" stroke="#1E8449" stroke-width="1.5" marker-end="url(#mg)"/>
<text x="575" y="248" class="sig" fill="#1E8449">bcd3..0</text>

<!-- reaction_fsm cheat → MUX control -->
<path d="M 465,278 C 480,278 487,278 500,278" fill="none" stroke="#E74C3C" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#mp)"/>
<text x="470" y="273" class="sig" fill="#E74C3C">cheat</text>

<!-- cheat MUX → seg7 ×4 -->
<path d="M 570,296 C 570,310 570,317 570,325" fill="none" stroke="#1E8449" stroke-width="1.5" marker-end="url(#mg)"/>
<text x="575" y="313" class="sig" fill="#1E8449">d3..d0</text>

<!-- seg7 → HEX -->
<path d="M 640,350 C 660,350 660,345 670,345" fill="none" stroke="#B7950B" stroke-width="2" marker-end="url(#my)"/>

<!-- ============ Legend ============ -->
<rect x="20" y="440" width="680" height="32" rx="4" fill="#F8F9FA" stroke="#AEB6BF" stroke-width="1"/>

<rect x="30" y="447" width="14" height="11" fill="#FDEBD0" stroke="#E67E22"/>
<text x="50" y="457" class="label-s">From Mon (cards #1 #2 #3)</text>

<rect x="200" y="447" width="14" height="11" fill="#D5F5E3" stroke="#1E8449"/>
<text x="220" y="457" class="label-s">Wed new (lfsr, fsm, bin2bcd)</text>

<rect x="395" y="447" width="14" height="11" fill="#FEF9E7" stroke="#B7950B"/>
<text x="415" y="457" class="label-s">Top-level glue (cheat MUX)</text>

<line x1="565" y1="453" x2="585" y2="453" stroke="#8E44AD" stroke-width="1.5" stroke-dasharray="3,2"/>
<text x="590" y="457" class="label-s">clock</text>

<line x1="640" y1="453" x2="660" y2="453" stroke="#E74C3C" stroke-width="1" stroke-dasharray="4,2"/>
<text x="664" y="457" class="label-s">rst_n</text>

<line x1="30" y1="465" x2="50" y2="465" stroke="#1B4F72" stroke-width="1.5"/>
<text x="55" y="468" class="label-s">primary inputs</text>

<line x1="160" y1="465" x2="180" y2="465" stroke="#E67E22" stroke-width="1.5"/>
<text x="185" y="468" class="label-s">intermediate</text>

<line x1="290" y1="465" x2="310" y2="465" stroke="#1E8449" stroke-width="1.5"/>
<text x="315" y="468" class="label-s">datapath signals</text>

<line x1="430" y1="465" x2="450" y2="465" stroke="#B7950B" stroke-width="2"/>
<text x="455" y="468" class="label-s">primary outputs</text>
</svg>
